<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Rare Fish Concept 03</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <section class="sidebar__block">
          <p class="eyebrow">Concept 03</p>
          <h1>One Perfect Screen</h1>
          <p class="muted">
            Только главный экран. Без попытки решить все приложение сразу.
          </p>
        </section>

        <section class="sidebar__block">
          <p class="label">Tracks</p>
          <div class="track-picker" id="track-picker"></div>
        </section>
      </aside>

      <main class="stage">
        <section class="device">
          <div class="device__shell">
            <div class="device__screen" id="screen">
              <header class="statusbar">
                <span>9:41</span>
                <span>Rare Fish</span>
                <span>Live</span>
              </header>

              <main class="hero" id="hero"></main>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
